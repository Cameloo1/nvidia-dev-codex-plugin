name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate plugin
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Script syntax checks
        shell: pwsh
        run: |
          Get-ChildItem -Path .\scripts -Recurse -File -Filter *.mjs | ForEach-Object {
            node --check $_.FullName
          }

      - name: MCP self-test
        shell: pwsh
        run: node .\scripts\nvidia-rtx-dlss-mcp.mjs --self-test

      - name: Production-readiness test
        shell: pwsh
        run: node .\scripts\tests\test-production-readiness.mjs
